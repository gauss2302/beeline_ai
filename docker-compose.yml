# DATABASE_URL for app: host "db" resolves in Docker network.
# Postgres + pgvector (vector extension) run in the single "db" service below.
services:
  # Postgres 17 with pgvector extension (db + vector in one container)
  db:
    image: pgvector/pgvector:pg17
    container_name: analyst_os_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: analyst_os
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d analyst_os"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyst_os_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      APP_URL: ${APP_URL:-http://localhost:3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://analyst:analyst@db:5432/analyst_os}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
